name: Build and deploy ASP.NET Core API to Azure Web App

on:
  push:
    branches:
      - master

env:
  AZURE_WEBAPP_NAME: ecommerce-orders-api-patryk
  DOTNET_VERSION: '8.0.x'
  PUBLISH_PATH: ./publish

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
  run: dotnet restore WebAPI/WebAPI.csproj

- name: Build
  run: dotnet build WebAPI/WebAPI.csproj --configuration Release --no-restore

- name: Publish
  run: dotnet publish WebAPI/WebAPI.csproj --configuration Release --no-build --output ${{ env.PUBLISH_PATH }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ${{ env.PUBLISH_PATH }}